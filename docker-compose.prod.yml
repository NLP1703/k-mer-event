# Production overrides for the VPS — HTTP on :8080, NO domain / NO HTTPS.
# Merge with the base file:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Secrets/URLs are read from a `.env` file next to this compose file on the VPS
# (never committed). Required keys: JWT_SECRET, DB_PASSWORD, DB_ROOT_PASSWORD.
#
# NOTE: the site is plain HTTP, so cookies must NOT be Secure (a Secure refresh
# cookie is dropped over HTTP and login/refresh silently break).
services:
  db:
    environment:
      MYSQL_DATABASE: ${DB_NAME:-kmer_event}
      MYSQL_USER: ${DB_USER:-kmer}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    # Do NOT expose MySQL to the public internet. !override REPLACES the base
    # port mapping (an empty list alone would be concatenated, not reset).
    ports: !override []
    restart: unless-stopped

  api:
    environment:
      NODE_ENV: production
      DB_NAME: ${DB_NAME:-kmer_event}
      DB_USER: ${DB_USER:-kmer}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      # Public base URL (IP:port, no domain). Used for CORS + email links.
      FRONTEND_URL: ${FRONTEND_URL:-http://2.25.178.95:8080}
      # Plain HTTP -> relax cookie flags so refresh works (same-origin => Lax).
      COOKIE_SECURE: 'false'
      COOKIE_SAMESITE: 'lax'
    restart: unless-stopped

  web:
    # Public entry point: the web container's internal Nginx serves the SPA and
    # proxies /api, /socket.io and /uploads to the api container. Overridable
    # (WEB_PORT) so a cutover can test on a temp port before taking :8080.
    # !override REPLACES the base port list (compose otherwise concatenates it).
    ports: !override
      - '${WEB_PORT:-8080}:80'
    restart: unless-stopped
