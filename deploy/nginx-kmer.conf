# ── K-MER Event — host Nginx (public reverse proxy) ──────────────────────────
# The VPS's own Nginx terminates TLS and forwards every request to the Docker
# `web` container, which listens on 127.0.0.1:8081 and already handles the SPA,
# /api, /socket.io and /uploads internally.
#
# Install on the VPS:
#   sudo cp deploy/nginx-kmer.conf /etc/nginx/sites-available/kmer
#   sudo ln -sf /etc/nginx/sites-available/kmer /etc/nginx/sites-enabled/kmer
#   sudo nginx -t && sudo systemctl reload nginx
# TLS certificate (free, auto-renewed):
#   sudo certbot --nginx -d your-domain.com

upstream kmer_web {
    server 127.0.0.1:8081;
}

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Let certbot handle the ACME challenge, redirect everything else to HTTPS.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.com;

    # certbot fills these in automatically when you run the command above.
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    # Match the container's upload limit.
    client_max_body_size 120M;

    location / {
        proxy_pass http://kmer_web;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket (Socket.IO) upgrade support.
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }
}
