name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET: ci_test_secret_at_least_32_characters_long_000
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Test (Jest + SQLite)
        run: npm test

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    # Only deploy tested code, and only from the main branch (never on PRs).
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Deploy over SSH (git pull + docker compose)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # Secrets forwarded into the remote shell to build the .env file.
          envs: JWT_SECRET,DB_PASSWORD,DB_ROOT_PASSWORD,FRONTEND_URL,COOKIE_SAMESITE,WEB_PORT
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_APP_DIR }}"

            # Pull the exact commit that triggered this run.
            git fetch --all --prune
            git reset --hard "${{ github.sha }}"

            # Rebuild the production .env from the forwarded secrets.
            cat > .env <<EOF
            JWT_SECRET=${JWT_SECRET}
            DB_PASSWORD=${DB_PASSWORD}
            DB_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
            FRONTEND_URL=${FRONTEND_URL}
            COOKIE_SAMESITE=${COOKIE_SAMESITE:-lax}
            WEB_PORT=${WEB_PORT:-8080}
            EOF
            chmod 600 .env

            # Build and (re)start the stack, then drop orphaned containers.
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
        env:
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_ROOT_PASSWORD: ${{ secrets.DB_ROOT_PASSWORD }}
          FRONTEND_URL: ${{ secrets.FRONTEND_URL }}
          COOKIE_SAMESITE: ${{ secrets.COOKIE_SAMESITE }}
          WEB_PORT: ${{ secrets.WEB_PORT }}
