server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 120M;

    # Compress text assets on the fly (the JS bundle is ~1.4MB -> ~350KB gzipped).
    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_vary on;
    gzip_proxied any;
    gzip_types
        text/plain text/css text/javascript
        application/javascript application/json application/xml
        image/svg+xml font/woff2;

    # Hashed build assets never change -> cache them hard for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback: unknown routes -> index.html. index.html itself must NOT be
    # cached, so new deploys are picked up without a hard refresh.
    location / {
        add_header Cache-Control "no-store";
        try_files $uri $uri/ /index.html;
    }

    # REST API -> backend service (docker-compose service name "api").
    location /api/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket (Socket.IO) upgrade headers.
    location /socket.io/ {
        proxy_pass http://api:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Uploaded media.
    location /uploads/ {
        proxy_pass http://api:4000;
        proxy_set_header Host $http_host;
    }
}
